name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests and install local artifact
        run: ./mvnw -B --no-transfer-progress install

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cyclonedx-sbom
          path: |
            target/*-cyclonedx.json
            target/*-cyclonedx.xml
          if-no-files-found: error

      - name: Compile example
        working-directory: examples/scheduled-audit-demo
        run: ../../mvnw -B --no-transfer-progress compile
