name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests and install local artifact
        run: ./mvnw -B --no-transfer-progress install

      - name: Compile example
        working-directory: examples/scheduled-audit-demo
        run: ../../mvnw -B --no-transfer-progress compile
