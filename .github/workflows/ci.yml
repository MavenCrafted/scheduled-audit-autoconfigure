name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve project version
        id: project-version
        run: echo "version=$(./mvnw help:evaluate '-Dexpression=project.version' -q -DforceStdout)" >> "$GITHUB_OUTPUT"

      - name: Check sample dependency version
        run: |
          sample_version=$(./mvnw -f examples/scheduled-audit-demo/pom.xml help:evaluate '-Dexpression=scheduled.audit.autoconfigure.version' -q -DforceStdout)
          test "${{ steps.project-version.outputs.version }}" = "$sample_version"

      - name: Run tests and install local artifact
        run: ./mvnw -B --no-transfer-progress install

      - name: Compile sample
        working-directory: examples/scheduled-audit-demo
        run: ../../mvnw -B --no-transfer-progress compile
